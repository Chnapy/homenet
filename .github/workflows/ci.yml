name: Release

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.2

      - name: Install dependencies
        working-directory: agent
        run: make install-deps

      - name: Build for ARM 32bits
        working-directory: agent
        run: make build-arm-32

      - name: Build for Linux 64bits
        working-directory: agent
        run: make build-linux-64

      - name: Build for Windows 64bits
        working-directory: agent
        run: make build-windows-64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agent/dist/agent_arm
            agent/dist/agent_linux
            agent/dist/agent_windows
